services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edge-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/acl:/mosquitto/config/acl:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - edge-net

  redis:
    image: redis:7-alpine
    container_name: edge-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - edge-net

  edge-api:
    build:
      context: .
      dockerfile: ./services/edge-api/Dockerfile
    container_name: edge-api
    restart: unless-stopped
    ports:
      - "${EDGE_API_PORT:-8080}:8080"
    environment:
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      EDGE_SHARED_AUTH: "${EDGE_SHARED_AUTH:-replace}"
      ZONE_INFO: "${ZONE_INFO:-America/Fortaleza}"
      TEMPFRAMES_DIR: "/edge-data/tempframes"
      MAX_FRAME_QUEUE: "${MAX_FRAME_QUEUE:-100}"
    depends_on:
      - redis
    networks:
      - edge-net
    volumes:
      - ./data/tempframes:/edge-data/tempframes

networks:
  edge-net:
    name: edge-net
    driver: bridge

volumes:
  mosquitto_data:
  redis_data:
