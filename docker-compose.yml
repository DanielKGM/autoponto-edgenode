services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edge-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/acl:/mosquitto/config/acl:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - edge-net

  redis:
    image: redis:7-alpine
    container_name: edge-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - edge-net

  edge-app:
    build:
      context: .
      dockerfile: ./services/edge-app/Dockerfile
    container_name: edge-app
    restart: unless-stopped
    ports:
      - "${EDGE_API_PORT:-8080}:8080"
    environment:
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_USER: "service"
      MQTT_PASS: "${MQTT_PASS_SERVICE:-replace}"
      EDGE_SHARED_AUTH: "${EDGE_SHARED_AUTH:-replace}"
      ZONE_INFO: "${ZONE_INFO:-America/Fortaleza}"
      MAX_FRAME_QUEUE: "${MAX_FRAME_QUEUE:-100}"
      MAX_EVENTOS_PRESENCA_REDIS: "${MAX_EVENTOS_PRESENCA_REDIS:-50000}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NODE_UUID: "${NODE_UUID:-edge-node}"
      AUTOPONTO_API_URL: "${AUTOPONTO_API_URL:-}"
      AUTOPONTO_API_TOKEN: "${AUTOPONTO_API_TOKEN:-}"
      FACE_EMBEDDING_ENCRYPTION_KEY: "${FACE_EMBEDDING_ENCRYPTION_KEY:-}"
      INTERSCITY_API_URL: "${INTERSCITY_API_URL:-}"
      RESOURCE_ADAPTOR_PATH: "${RESOURCE_ADAPTOR_PATH:-/adaptor/resources}"
      INTERSCITY_QUEUE_MAX: "${INTERSCITY_QUEUE_MAX:-1000}"
      INTERSCITY_WORKERS: "${INTERSCITY_WORKERS:-1}"
      INTERSCITY_TIMEOUT_SECONDS: "${INTERSCITY_TIMEOUT_SECONDS:-5}"
      METRICAS_AVG_US_PATH: "${METRICAS_AVG_US_PATH:-/data/logs/metricas_avg_us.txt}"
      METRICAS_AVG_US_AMOSTRAS_PATH: "${METRICAS_AVG_US_AMOSTRAS_PATH:-/data/logs/metricas_avg_us_amostras.csv}"
      METRICAS_AVG_US_DISPOSITIVO_CODIGO: "${METRICAS_AVG_US_DISPOSITIVO_CODIGO:-}"
      TCC_EVIDENCIAS_ENABLED: "${TCC_EVIDENCIAS_ENABLED:-1}"
      TCC_EVIDENCIAS_DIR: "${TCC_EVIDENCIAS_DIR:-/data/logs/tcc}"
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - mosquitto
    networks:
      - edge-net

  face-worker:
    build:
      context: .
      dockerfile: ./services/face-worker/Dockerfile
    container_name: face-worker
    restart: unless-stopped
    environment:
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      DETECT_MODEL_PATH: "/models/face_detection_yunet.onnx"
      RECOG_MODEL_PATH: "/models/face_recognition_sface.onnx"
      FACE_SCORE_THRESHOLD: "${FACE_SCORE_THRESHOLD:-0.8}"
      FACE_MATCH_THRESHOLD: "${FACE_MATCH_THRESHOLD:-0.363}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TCC_EVIDENCIAS_ENABLED: "${TCC_EVIDENCIAS_ENABLED:-1}"
      TCC_EVIDENCIAS_DIR: "${TCC_EVIDENCIAS_DIR:-/data/logs/tcc}"
    volumes:
      - ./data:/data
      - ./data/models:/models:ro
    depends_on:
      - redis
    networks:
      - edge-net

networks:
  edge-net:
    name: edge-net
    driver: bridge

volumes:
  mosquitto_data:
  redis_data:
