services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edge-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/acl:/mosquitto/config/acl:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - edge-net

  redis:
    image: redis:7-alpine
    container_name: edge-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - edge-net

networks:
  edge-net:
    name: edge-net
    driver: bridge

volumes:
  mosquitto_data:
  redis_data: