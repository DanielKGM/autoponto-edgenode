services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edge-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/acl:/mosquitto/config/acl:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - edge-net

  redis:
    image: redis:7-alpine
    container_name: edge-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - edge-net

  edge-api:
    build:
      context: .
      dockerfile: ./services/edge-api/Dockerfile
    container_name: edge-api
    restart: unless-stopped
    ports:
      - "${EDGE_API_PORT:-8080}:8080"
    environment:
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      EDGE_SHARED_AUTH: "${EDGE_SHARED_AUTH:-replace}"
      ZONE_INFO: "${ZONE_INFO:-America/Fortaleza}"
      MAX_FRAME_QUEUE: "${MAX_FRAME_QUEUE:-100}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      - redis
    networks:
      - edge-net

  mqtt-listener:
    build:
      context: .
      dockerfile: ./services/mqtt-listener/Dockerfile
    container_name: mqtt-listener
    restart: unless-stopped
    environment:
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_USER: "service"
      MQTT_PASS: "${MQTT_PASS_SERVICE:-replace}"
    depends_on:
      - redis
      - mosquitto
    networks:
      - edge-net
      
  face-worker:
    build:
      context: .
      dockerfile: ./services/face-worker/Dockerfile
    container_name: face-worker
    restart: unless-stopped
    environment:
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      MQTT_HOST: "mosquitto"
      MQTT_USER: "service"
      MQTT_PASS: "${MQTT_PASS_SERVICE:-replace}"
      DETECT_MODEL_PATH: "/models/face_detection_yunet.onnx"
      RECOG_MODEL_PATH: "/models/face_recognition_sface.onnx"
      FACE_SCORE_THRESHOLD: "${FACE_SCORE_THRESHOLD:-0.85}"
      FACE_MATCH_THRESHOLD: "${FACE_MATCH_THRESHOLD:-0.363}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - ./data/models:/models:ro
    depends_on:
      - redis
      - mosquitto
    networks:
      - edge-net

networks:
  edge-net:
    name: edge-net
    driver: bridge

volumes:
  mosquitto_data:
  redis_data: